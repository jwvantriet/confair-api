  """Tenant is fully provisioned: SSO and IAM API are available."""
  ready

  """
  Tenant is suspended with auto-deletion scheduled for a certain point in time, due to expired contract or missed payment.
  For suspended tenants SSO and API usage are not available.
  Contact support for more information.
  """
  suspended

  """
  Tenant is being suspended. SSO and API usage may be not fully available.
  """
  suspending

  """
  Tenant is being unsuspended: transitioned back to `ready` status. SSO and API usage may be not fully available.
  SSO and API usage are not available.
  """
  unsuspending
}

