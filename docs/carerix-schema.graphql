"""Information about the entity responsible for initiating the change."""
type ChangeInitiator {
  """
  Represents the entity that performed the impersonation. If the initiator
  of the change (e.g., an admin user) acted as a different
  user (impersonated them), this field holds the details of the impersonating entity.
  
  For example, in cases where an admin performs actions on behalf of an end-user,
  the `impersonator` field provides the identity of the admin user who is impersonating the end-user.
  If no impersonation was involved, this field will be `null`.
  """
  impersonator: Impersonator

  """
  Information about the entity responsible for initiating the change, such as a user or service account.
  """
  initiator: Initiator!
}

