"""Actor"""
interface Actor {
  """The unique identifier for the actor"""
  _id: ID!

  """
  Indicates the type of API resource; 'Candidate', 'Contact', 'OfficeEmployee'.
  """
  _kind: ID!

  """Display name"""
  displayName: String
}

"""
A GraphQL type representing an AI Prompt, which serves as a structured input for generating AI responses or interactions.
"""
type AiPrompt implements APIResource {
  """Reference to auditor by whom AI Prompt is created"""
  _createdBy: Auditor

  """Created date time"""
  _createdDateTime: Instant

  """AI Prompt id"""
  _id: ID!

  """Kind of API resource, always is 'AIPrompt'"""
  _kind: ID!

  """Reference to auditor by whom AI Prompt is updated"""
  _updatedBy: Auditor

  """Updated date time"""
  _updatedDateTime: Instant

  """List of AI Prompt contexts"""
  context: [String]

  """AI Prompt description"""
  description: String

  """
  Flag to indicate if AI Prompt is global or not. If true then AI Prompt is available for all tenants and
  it is not modifiable, if false then AI Prompt belongs to tenant
  """
  global: Boolean

  """AI Prompt name"""
  name: String!

  """Reference to user who own this AI Prompt"""
  owner: User
}

"""Request to create AI Prompt"""
input AiPromptCreateRequest {
  """Kind of API resource, must always be 'AIPrompt'"""
  _kind: ID!

  """List of AI Prompt contexts."""
  context: [String]

  """AI Prompt description"""
  description: String

  """AI Prompt name"""
  name: String!
}

"""Page of AI Prompts"""
type AiPromptPage implements APIResourcePage {
  first: Boolean

  """Page Items"""
  items: [AiPrompt]
  last: Boolean
  numberOfElements: Int
  page: Int
  size: Int
  sort: String
  totalElements: Int
  totalPages: Int
}

"""Request to update AI Prompt"""
input AiPromptUpdateRequest {
  """Kind of API resource, must always be 'AIPrompt'"""
  _kind: ID!

  """
  List of AI Prompt contexts. If new item need to added then full list need to be provided
  """
  context: [String]

  """AI Prompt description"""
  description: String

  """AI Prompt name"""
  name: String
}

"""An entity served via the API."""
